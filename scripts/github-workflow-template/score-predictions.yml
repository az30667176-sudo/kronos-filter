name: Score matured predictions

on:
  schedule:
    # Run daily at 23:00 UTC (after US market close + data settles)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install supabase==2.9.1 requests numpy

      - name: Run scoring
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/score_predictions.py
